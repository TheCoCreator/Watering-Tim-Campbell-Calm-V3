    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        color: #334155;
        scroll-behavior: smooth;
      }
      /* Smooth accordion transition */
      .accordion-content {
        transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
        max-height: 0;
        opacity: 0;
        overflow: hidden;
      }
      .accordion-content.open {
        max-height: 500px;
        opacity: 1;
      }
      /* Fade in animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      /* Calm Breathing Pulse (4-7-8 Cycle) - 19 seconds total */
      @keyframes calm-breathing {
        0%, 100% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 0 0 rgba(232, 90, 60, 0); }
        22% { transform: scale(1.6); opacity: 1; box-shadow: 0 0 15px 4px rgba(232, 90, 60, 0.3); } /* 4s in */
        61% { transform: scale(1.6); opacity: 1; box-shadow: 0 0 15px 4px rgba(232, 90, 60, 0.3); } /* 7s hold */
        100% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 0 0 rgba(232, 90, 60, 0); } /* 8s out */
      }
      .animate-calm-pulse {
        animation: calm-breathing 19s ease-in-out infinite;
      }
    </style>
